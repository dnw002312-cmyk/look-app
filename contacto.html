<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0D2340" />
  <title>Contacto — LOOK</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
  </head>
<body>
  <script src="js/layout.js"></script>
  <script src="js/script.js"></script>
  <script>
    renderLayout('Contacto');
    document.getElementById('mainContent').innerHTML = `
      <div class="page-layout">
        <aside class="sidebar">
          <div class="sidebar__section">
            <div class="sidebar__title">Navegación</div>
            <a class="sidebar__link" href="catalogo.html"><span class="material-icons-outlined">storefront</span> Marketplace</a>
            <a class="sidebar__link" href="favoritos.html"><span class="material-icons-outlined">favorite_border</span> Favoritos</a>
            <a class="sidebar__link" href="perfil.html"><span class="material-icons-outlined">person</span> Mi perfil</a>
            <a class="sidebar__link active" href="contacto.html"><span class="material-icons-outlined">mail_outline</span> Contacto</a>
          </div>
        </aside>
        <div class="content" style="max-width:600px">
          <h1 class="section-title" style="display:flex;align-items:center;gap:8px"><span class="material-icons-outlined">mail_outline</span> Contacto</h1>
          <p class="section-subtitle">¿Quieres vender? Cuéntanos qué tienes y te ayudamos</p>
          <form class="contact-form" id="contactForm">
            <div class="form-group"><input type="text" id="formName" placeholder="Tu nombre" required /><span class="form-error"></span></div>
            <div class="form-group"><input type="email" id="formEmail" placeholder="Tu correo" required /><span class="form-error"></span></div>
            <div class="form-group"><textarea id="formMessage" rows="5" placeholder="Describe lo que quieres vender..." required></textarea><span class="form-error"></span></div>
            <button type="submit" class="btn btn--primary btn--full btn--lg">Enviar mensaje</button>
          </form>
          <div class="contact-success" id="contactSuccess">¡Mensaje enviado! Te contactaremos pronto.</div>
        </div>
      </div>
    `;
    initPage();
  </script>
</body>
</html>
