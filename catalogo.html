<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0D2340" />
  <title>Marketplace — LOOK</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
  </head>
<body>
  <script src="js/layout.js"></script>
  <script src="js/script.js"></script>
  <script>
    renderLayout('Marketplace');
    document.getElementById('mainContent').innerHTML = `
      <div class="page-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
          <div class="sidebar__section">
            <div class="sidebar__title">Categorías</div>
            <a class="sidebar__link active" data-filter="todas" href="#"><span class="material-icons-outlined">apps</span> Todas</a>
            <a class="sidebar__link" data-filter="mujer" href="#"><span class="material-icons-outlined">woman</span> Mujer</a>
            <a class="sidebar__link" data-filter="hombre" href="#"><span class="material-icons-outlined">man</span> Hombre</a>
            <a class="sidebar__link" data-filter="accesorios" href="#"><span class="material-icons-outlined">watch</span> Accesorios</a>
          </div>
          <div class="sidebar__section">
            <div class="sidebar__title">Filtros rápidos</div>
            <a class="sidebar__link" id="sidebarFav" href="favoritos.html"><span class="material-icons-outlined">favorite_border</span> Mis favoritos</a>
            <a class="sidebar__link" id="sidebarUpload" href="#"><span class="material-icons-outlined">add_circle_outline</span> Publicar producto</a>
          </div>
        </aside>

        <!-- Main content -->
        <div class="content">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
            <div>
              <h1 class="section-title">Marketplace</h1>
              <p class="section-subtitle" style="margin-bottom:0">Descubre, compra y vende ropa de segunda mano</p>
            </div>
          </div>

          <div class="catalog__controls">
            <div class="filter-tabs" id="filterTabs">
              <button class="filter-tab active" data-filter="todas">Todas</button>
              <button class="filter-tab" data-filter="mujer">Mujer</button>
              <button class="filter-tab" data-filter="hombre">Hombre</button>
              <button class="filter-tab" data-filter="accesorios">Accesorios</button>
            </div>
          </div>

          <div class="products" id="productsContainer"></div>
        </div>
      </div>
    `;

    // Sidebar filter clicks
    document.querySelectorAll('.sidebar__link[data-filter]').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelectorAll('.sidebar__link').forEach(l => l.classList.remove('active'));
        link.classList.add('active');
        const filter = link.dataset.filter;
        document.querySelectorAll('.filter-tab').forEach(t => {
          t.classList.toggle('active', t.dataset.filter === filter);
        });
        currentFilter = filter;
        renderProducts();
      });
    });

    // Sidebar upload link
    document.getElementById('sidebarUpload')?.addEventListener('click', (e) => {
      e.preventDefault();
      openUpload();
    });

    initPage();
    renderProducts();
  </script>
</body>
</html>
