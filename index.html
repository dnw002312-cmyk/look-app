<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0D2340" />
  <title>LOOK — Compra, vende y reutiliza ropa</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
  </head>
<body>
  <script src="js/layout.js"></script>
  <script src="js/script.js"></script>
  <script>
    renderLayout('Inicio');
    document.getElementById('mainContent').innerHTML = `
      <div class="hero">
        <div class="hero__content">
          <h1>La moda que quieres,<br/>al alcance de tu mano</h1>
          <p>Compra y vende ropa de segunda mano. Dale una nueva vida a tu armario con LOOK, el marketplace de moda circular.</p>
          <div class="hero__actions">
            <a href="catalogo.html" class="btn btn--brand btn--lg">Explorar marketplace</a>
            <a href="catalogo.html" class="btn btn--outline btn--lg" style="border-color:oklch(1 0 0 / 0.3);color:white">Quiero vender</a>
          </div>
        </div>
        <div class="hero__visual">
          <div class="hero__img-placeholder">
            <span class="material-icons-outlined" style="font-size:80px;color:white">checkroom</span>
          </div>
        </div>
      </div>

      <div style="padding:40px 0">
        <h2 class="section-title">Categorías populares</h2>
        <p class="section-subtitle">Encuentra lo que buscas</p>
        <div class="categories" id="categoriesContainer"></div>
      </div>

      <div style="padding:20px 0 40px">
        <h2 class="section-title">Recién publicados</h2>
        <p class="section-subtitle">Las últimas prendas añadidas al marketplace</p>
        <div class="products" id="productsContainer"></div>
      </div>
    `;
    renderCategories();
    initPage();
  </script>
</body>
</html>
