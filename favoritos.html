<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Favoritos — LOOK</title>
  <link rel="icon" type="image/jpeg" href="assets/logo.jpeg" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <script src="js/layout.js"></script>
  <script src="js/script.js"></script>
  <script>
    renderLayout('Favoritos');
    document.getElementById('mainContent').innerHTML = `
      <section class="section" id="favoritos">
        <div class="container">
          <h2 class="section__title"><span class="material-icons-outlined">favorite</span> Tus favoritos</h2>
          <p class="section__desc">Prendas que te han gustado</p>
          <div class="products" id="favoritesContainer"><!-- JS render --></div>
        </div>
      </section>
    `;
    initPage();
    if (!currentUser) {
      document.getElementById('favoritos').innerHTML = '<div class="auth-gate" style="min-height:50vh"><div class="auth-gate__content"><span class="material-icons-outlined auth-gate__icon">lock</span><h3 class="auth-gate__title">Inicia sesión para ver favoritos</h3><p class="auth-gate__text">Guarda tus prendas favoritas mientras exploras el catálogo.</p><div class="auth-gate__actions"><button class="btn btn--primary" onclick="openAuth()">Iniciar sesión</button></div></div></div>';
    } else {
      renderFavorites();
    }
  </script>
</body>
</html>
